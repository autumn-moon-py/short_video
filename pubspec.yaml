name: short_video
description: A new Flutter project.
publish_to: "none"
version: 1.0.0+1
environment:
  sdk: ">=3.1.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # 状态管理
  get: ^4.6.6
  # 屏幕适配
  flutter_screenutil: ^5.9.0
  # 悬浮提示
  flutter_easyloading: ^3.0.5
  # 日志
  logger: ^1.4.0
  # 耳机监听
  headset_connection_event: ^3.1.0
  # 音量监听
  volume_controller: ^2.0.7
  # 后台屏幕保护
  screen_protector: ^1.4.0
  # 视频播放
  media_kit_video: ^1.2.4
  # 视频播放配件
  media_kit_libs_video: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  # 代码检查
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true